<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISTEPOS — Defensive Playbook</title>
  <style>
    .playbook-grid {
      display: grid;
      grid-template-columns: minmax(180px, 240px) 1fr;
      gap: 16px;
    }
    .dict-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .dict-detail-desktop { display: block; }
    .dict-mobile-overlay { display: none;  }
    @media (max-width: 700px) {
      .playbook-grid       { grid-template-columns: 1fr; }
      .dict-grid           { grid-template-columns: 1fr; }
      .dict-detail-desktop { display: none; }
      .dict-mobile-overlay { display: flex; }
    }
  </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
